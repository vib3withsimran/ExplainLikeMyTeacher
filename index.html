<!DOCTYPE html>
<html>

<head>
    <title>Explain Like My Teacher</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h2>Explain Like My Teacher</h2>
        <p class="subtitle">Learn the way teachers explain</p>
        <label for="fileInput" class="file-label">Choose Lecture Video</label>
        <input type="file" id="fileInput" hidden>
        <span id="fileName">No Video Selected</span>
        <input type="text" id="question" placeholder="Ask question">
        <button onclick="sendData()">Explain</button>
        <p id="result"></p>
    </div>

    <script src="script.js"></script>

</body>

</html>
